services:
  web:
    build: .
    container_name: flask-web
    ports:
      - "5000:5000"

    depends_on:
      - database

  database:
    image: mysql:8.0
    container_name: mysql-container

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: studentdb

    ports:
      - "3306:3306"


