name: Deploy Static Website

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps: 
    - uses: actions/checkout@v4

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: .

    - name: Deploy to Github Pages
      id: deployment
      uses: actions/deploy-pages@v4


